name: Publish Skills to ClawHub

on:
  push:
    branches: [main]
    paths:
      - 'public/*.md'
      - 'public/*.json'
      # UNCOMMENT THESE when ready to auto-publish variants (see DEPLOYMENT.md "Enabling Variant Publishing")
      # - 'skill-variants/**/variant.config.json'
      # - 'skill-variants/build-variants.ts'

jobs:
  publish-main-skill:
    name: Publish Main Skill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Extract version from skill.md frontmatter
        id: skill-meta
        run: |
          VERSION=$(grep -m1 '^version:' public/skill.md | sed 's/^version:[[:space:]]*//')
          NAME=$(grep -m1 '^name:' public/skill.md | sed 's/^name:[[:space:]]*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Detected skill: $NAME v$VERSION"

      - name: Publish main skill
        run: |
          clawhub publish ./public \
            --slug ${{ steps.skill-meta.outputs.name }} \
            --version ${{ steps.skill-meta.outputs.version }} \
            --tags latest \
            --no-input
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

